[tox]
envlist = ruff-format,ruff-check,pytest
isolated_build = true

[testenv]
basepython = python3
skip_install = true

[testenv:ruff-check]
description = Run ruff linting
deps =
    ruff>=0.8.0
commands =
    ruff check .

[testenv:ruff-format]
description = Check code formatting with ruff
deps =
    ruff>=0.8.0
commands =
    ruff format --check .

[testenv:pytest]
description = Run pytest unit tests with coverage
skip_install = false
deps =
    pytest>=8.0.0
    pytest-cov>=4.1.0
    pytest-flask>=1.3.0
    httpx>=0.27.0
commands =
    pytest tests/ -v --tb=short --cov=app --cov=mcp_server --cov-report=html --cov-report=xml --cov-report=term-missing --cov-fail-under=80

[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    unit: Unit tests (isolated, no external deps)
    slow: Slow-running tests
addopts =
    -v
    --strict-markers
    --tb=short
    --cov-report=term-missing
    --cov-config=tests/.coveragerc
